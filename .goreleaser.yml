version: 2

builds:
  - main: ./cmd/lin
    binary: lin
    ldflags: -s -w -X main.version={{.Version}}
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']

release:
  github:
    owner: shhac
    name: lin

changelog:
  sort: asc
  filters:
    exclude: [''^chore:'', ''^docs:'', ''^test:'']
