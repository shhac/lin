name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: build + vet + test + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.1
